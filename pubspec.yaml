publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.0
  path: ^1.9.0
  intl: ^0.19.0
  flutter_bluetooth_serial: ^0.4.0
  encrypt: ^5.0.3
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
